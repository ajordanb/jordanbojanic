<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; color:#1a1a1a; line-height:1.6;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:32px 16px;">
        <tr>
            <td align="center">
                <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px; width:100%;">
                    <tr>
                        <td style="padding-bottom:24px;">
                            <p style="margin:0 0 16px; font-size:16px;">Hey {{ recipient_name }},</p>
                            <p style="margin:0 0 24px; font-size:16px; white-space:pre-wrap;">{{ reply_text }}</p>
                            <p style="margin:0 0 24px; font-size:16px;">Best,<br>{{ from_name }}</p>
                            <table cellpadding="0" cellspacing="0" style="margin:0 0 8px;">
                                <tr>
                                    <td style="background:#1a1a1a; border-radius:6px;">
                                        <a href="{{ magic_link }}" style="display:inline-block; padding:10px 20px; font-size:14px; color:#ffffff; text-decoration:none;">Continue the conversation</a>
                                    </td>
                                </tr>
                            </table>
                            <p style="margin:0; font-size:12px; color:#999;">This link is valid for 30 days.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="border-top:1px solid #e5e5e5; padding-top:16px;">
                            <p style="margin:0; font-size:13px; color:#999;">{{ app_name }}</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
